<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bloom OS - System Standard</title>
    <style>
        :root {
            --aura-self: #E8D9C5;
            --aura-family: #C2D1B2;
            --aura-social: #FFB09C;
            --aura-productivity: #323B47;
            --aura-world: #DDE3E6;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; transition: background-color 0.8s ease;
            display: flex; flex-direction: column; align-items: center;
            font-family: -apple-system, sans-serif; touch-action: none;
            background-color: var(--aura-self);
        }

        /* Top Right Indicator Nucleus */
        #nucleus-indicator {
            position: absolute; top: 60px; right: 30px;
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            z-index: 100; transition: all 0.5s ease;
        }

        /* Large World Nucleus (Hidden by default) */
        #nucleus-large {
            width: 150px; height: 150px;
            background: white; border-radius: 50%;
            display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            z-index: 50;
        }

        /* Central Mote Area */
        #mote-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            width: 100%; position: relative;
        }

        .mote {
            width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 40px; /* Slightly squircle */
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        /* The Roots (Bottom Bar) */
        #roots {
            width: 100%; height: 100px;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 20px; z-index: 80;
        }
        .root-mote {
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            font-size: 18px; opacity: 0.6;
        }

        /* Labels */
        #aura-label {
            position: absolute; top: 70px; left: 30px;
            text-transform: uppercase; letter-spacing: 3px;
            font-size: 12px; color: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="aura-label">Self</div>
    <div id="nucleus-indicator"></div>

    <div id="mote-container">
        <div id="nucleus-large"></div>
        <div id="active-mote" class="mote">
            <span id="mote-icon" style="font-size: 30px; opacity: 0.5;">✦</span>
        </div>
    </div>

    <div id="roots">
        <div class="root-mote">☏</div>
        <div class="root-mote">✉</div>
        <div class="root-mote">◎</div>
    </div>

    <script>
        const body = document.body;
        const label = document.getElementById('aura-label');
        const indicator = document.getElementById('nucleus-indicator');
        const largeNucleus = document.getElementById('nucleus-large');
        const activeMote = document.getElementById('active-mote');
        const moteIcon = document.getElementById('mote-icon');

        const config = {
            self: { color: 'var(--aura-self)', icon: '✦', large: false },
            family: { color: 'var(--aura-family)', icon: '❤', large: false },
            social: { color: 'var(--aura-social)', icon: '◎', large: false },
            productivity: { color: 'var(--aura-productivity)', icon: '◈', large: false },
            world: { color: 'var(--aura-world)', icon: '', large: true }
        };

        const auras = Object.keys(config);
        let currentIdx = 0;
        let startY;

        document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });

        document.addEventListener('touchend', e => {
            const endY = e.changedTouches[0].clientY;
            if (endY > startY + 80) shiftAura(-1); // Swipe Down
            else if (endY < startY - 80) shiftAura(1); // Swipe Up
        });

        function shiftAura(dir) {
            currentIdx = (currentIdx + dir + auras.length) % auras.length;
            const state = config[auras[currentIdx]];

            body.style.backgroundColor = state.color;
            label.innerText = auras[currentIdx];
            moteIcon.innerText = state.icon;

            if (state.large) {
                activeMote.style.display = 'none';
                largeNucleus.style.display = 'block';
                indicator.style.opacity = '0';
            } else {
                activeMote.style.display = 'flex';
                largeNucleus.style.display = 'none';
                indicator.style.opacity = '1';
            }

            // Adjust text colors for dark mode (Productivity)
            const isDark = auras[currentIdx] === 'productivity';
            label.style.color = isDark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.3)';
        }
    </script>
</body>
</html>
