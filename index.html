<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bloom OS - Phase 4</title>
    <style>
        :root {
            /* Your Mediterranean Palette */
            --aura-self: #E8D9C5; /* Warm Sand */
            --aura-family: #C2D1B2; /* Heirloom Green */
            --aura-social: #FFB09C; /* Sunset Coral */
            --aura-productivity: #323B47; /* Steel Slate */
            --aura-world: #DDE3E6; /* Arctic Mist */
            
            --nucleus-glass: rgba(255, 255, 255, 0.9);
            --mote-glass: rgba(255, 255, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, sans-serif; touch-action: none;
            background-color: var(--aura-self);
        }

        /* The Nucleus */
        #nucleus {
            width: 130px; height: 130px;
            background: var(--nucleus-glass);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05), inset 0 -2px 10px rgba(255,255,255,1);
            backdrop-filter: blur(20px);
            z-index: 100; position: relative;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* The Mote & The Bloom Canvas */
        #mote {
            width: 65px; height: 65px;
            background: var(--mote-glass);
            border-radius: 50%;
            position: absolute;
            top: 55%; /* Orbiting below center */
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            backdrop-filter: blur(10px);
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 50;
            cursor: pointer;
        }

        /* Bloom State */
        #mote.bloomed {
            width: 100vw; height: 100vh;
            top: 0; left: 0; border-radius: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 150;
        }

        .mote-content {
            opacity: 0; transition: opacity 0.3s ease;
            text-align: center; font-weight: 300;
        }
        #mote.bloomed .mote-content { opacity: 1; }
        #mote.bloomed .mote-icon { display: none; }

        .mote-icon { font-size: 22px; opacity: 0.5; transition: transform 0.3s; }

        /* UI Elements */
        #label-container {
            position: absolute; top: 80px; text-align: center;
            width: 100%; pointer-events: none; z-index: 10;
        }
        .label {
            font-weight: 400; letter-spacing: 4px;
            color: rgba(0,0,0,0.25); text-transform: uppercase; font-size: 11px;
            opacity: 0; transition: opacity 0.5s ease; position: absolute; width: 100%;
        }
        .active-label { opacity: 1; }
        
        #void {
            position: absolute; bottom: 50px;
            width: 70px; height: 5px;
            background: rgba(0,0,0,0.1); border-radius: 10px;
            z-index: 200; cursor: pointer;
        }

        /* Specific Productivity handling for dark text */
        .dark-mode-text { color: rgba(255,255,255,0.4) !important; }
    </style>
</head>
<body>
    <div id="label-container">
        <div id="label-self" class="label active-label">Self</div>
        <div id="label-family" class="label">Family</div>
        <div id="label-social" class="label">Social</div>
        <div id="label-productivity" class="label">Productivity</div>
        <div id="label-world" class="label">World</div>
    </div>
    
    <div id="nucleus"></div>

    <div id="mote">
        <span id="mote-icon" class="mote-icon">✦</span>
        <div class="mote-content">
            <h2 id="bloom-title">Workspace</h2>
            <p>Your Bloom is active.</p>
        </div>
    </div>

    <div id="void"></div>

    <script>
        const nucleus = document.getElementById('nucleus');
        const mote = document.getElementById('mote');
        const moteIcon = document.getElementById('mote-icon');
        const labels = document.querySelectorAll('.label');
        const body = document.body;
        
        const auras = ['self', 'family', 'social', 'productivity', 'world'];
        const colors = ['var(--aura-self)', 'var(--aura-family)', 'var(--aura-social)', 'var(--aura-productivity)', 'var(--aura-world)'];
        const icons = ['✦', '❤', '◎', '◈', '◇'];
        
        let currentIdx = 0;
        let startX;
        let isBloomed = false;

        // Aura Shifting
        document.addEventListener('touchstart', (e) => {
            if (isBloomed) return;
            startX = e.touches[0].clientX;
        });

        document.addEventListener('touchend', (e) => {
            if (isBloomed) return;
            const endX = e.changedTouches[0].clientX;
            if (endX > startX + 70) shiftAura(1);
            else if (endX < startX - 70) shiftAura(-1);
        });

        function shiftAura(direction) {
            labels[currentIdx].classList.remove('active-label');
            currentIdx = (currentIdx + direction + auras.length) % auras.length;
            
            body.style.backgroundColor = colors[currentIdx];
            labels[currentIdx].classList.add('active-label');
            moteIcon.innerText = icons[currentIdx];

            // Adjust label color for Productivity (Dark Aura)
            if (auras[currentIdx] === 'productivity') {
                labels.forEach(l => l.style.color = 'rgba(255,255,255,0.3)');
            } else {
                labels.forEach(l => l.style.color = 'rgba(0,0,0,0.25)');
            }
        }

        // Bloom Logic
        mote.addEventListener('click', () => {
            if (!isBloomed) {
                mote.classList.add('bloomed');
                nucleus.style.transform = 'scale(0.8) translateY(-100px)';
                nucleus.style.opacity = '0.3';
                isBloomed = true;
            }
        });

        // The Void Dismissal
        document.getElementById('void').addEventListener('click', () => {
            if (isBloomed) {
                mote.classList.remove('bloomed');
                nucleus.style.transform = 'scale(1) translateY(0)';
                nucleus.style.opacity = '1';
                isBloomed = false;
            }
        });
    </script>
</body>
</html>
