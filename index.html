<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bloom OS - Phase 2</title>
    <style>
        :root {
            --aura-self: #f5f5f7;
            --aura-family: #e8f5e9;
            --aura-social: #fff0eb;
            --aura-productivity: #e3f2fd;
            --aura-world: #eceff1;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; transition: background-color 0.8s ease;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, sans-serif; touch-action: none;
            background-color: var(--aura-self);
        }
        #nucleus {
            width: 140px; height: 140px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            box-shadow: 0 15px 45px rgba(0,0,0,0.05), inset 0 -2px 10px rgba(255,255,255,1);
            backdrop-filter: blur(15px);
            z-index: 10; position: relative;
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #label-container {
            position: absolute; top: 80px; text-align: center;
            width: 100%; pointer-events: none;
        }
        .label {
            font-weight: 400; letter-spacing: 4px;
            color: rgba(0,0,0,0.2); text-transform: uppercase; font-size: 11px;
            opacity: 0; transition: opacity 0.5s ease; position: absolute; width: 100%;
        }
        .active-label { opacity: 1; }
        #void {
            position: absolute; bottom: 50px;
            width: 60px; height: 4px;
            background: rgba(0,0,0,0.05); border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="label-container">
        <div id="label-self" class="label active-label">Self Aura</div>
        <div id="label-family" class="label">Family Aura</div>
        <div id="label-social" class="label">Social Aura</div>
        <div id="label-productivity" class="label">Productivity Aura</div>
        <div id="label-world" class="label">World Aura</div>
    </div>
    
    <div id="nucleus"></div>
    <div id="void"></div>

    <script>
        const nucleus = document.getElementById('nucleus');
        const body = document.body;
        const auras = ['self', 'family', 'social', 'productivity', 'world'];
        const colors = ['var(--aura-self)', 'var(--aura-family)', 'var(--aura-social)', 'var(--aura-productivity)', 'var(--aura-world)'];
        let currentIdx = 0;
        let startX, startY;

        // Visual Reactivity
        nucleus.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            nucleus.style.transform = 'scale(1.1)';
        });

        document.addEventListener('touchend', (e) => {
            nucleus.style.transform = 'scale(1)';
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;

            // Simple swipe detection (Right swipe to cycle)
            if (endX > startX + 50) {
                shiftAura(1);
            } else if (endX < startX - 50) {
                shiftAura(-1);
            }
        });

        function shiftAura(direction) {
            // Remove old label
            document.getElementById(`label-${auras[currentIdx]}`).classList.remove('active-label');
            
            // Cycle index
            currentIdx = (currentIdx + direction + auras.length) % auras.length;
            
            // Set new Aura
            body.style.backgroundColor = colors[currentIdx];
            document.getElementById(`label-${auras[currentIdx]}`).classList.add('active-label');
            
            // Haptic Feedback (If available in browser)
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }
    </script>
</body>
</html>
