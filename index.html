<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ora OS - Unified Grid</title>
    <style>
        :root {
            --aura-self: #BA9470;
            --mote-glass: rgba(255, 255, 255, 0.15);
            --mote-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--aura-self);
            font-family: -apple-system, sans-serif; touch-action: none;
        }

        /* The Nucleus - Top Right Sentry */
        #nucleus {
            position: absolute; top: 65px; right: 30px;
            width: 48px; height: 48px;
            background: radial-gradient(circle at 35% 35%, #fff 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 100%);
            border-radius: 50%; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1), inset 0 2px 5px #fff;
        }

        /* The Grid System */
        #page-container {
            display: flex; width: 200vw; height: 100%;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .page {
            width: 100vw; height: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            padding: 120px 25px 160px 25px; /* Avoiding Nucleus and Dock */
            box-sizing: border-box; gap: 20px;
        }

        /* Glossy Viewport Mote */
        .mote {
            width: 100%; aspect-ratio: 1/1;
            background: var(--mote-glass);
            border-radius: 50%;
            border: 1px solid var(--mote-border);
            backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center;
            /* Apple-style Refractive Depth */
            box-shadow: 
                0 10px 25px rgba(0,0,0,0.1),
                inset 0 4px 10px rgba(255,255,255,0.3),
                inset 0 -4px 10px rgba(0,0,0,0.05);
            position: relative; overflow: hidden;
        }

        .mote-core {
            width: 40%; height: 40%;
            background: rgba(255,255,255,0.4);
            border-radius: 50%; filter: blur(2px);
        }

        /* The Roots (Static Dock) */
        #roots {
            position: absolute; bottom: 40px; left: 5%; width: 90%;
            height: 100px; display: flex; justify-content: space-around;
            align-items: center; z-index: 500;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px); border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .root-orb {
            width: 65px; height: 65px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div id="nucleus"></div>

    <div id="page-container">
        <div class="page" id="page1">
            </div>
        <div class="page" id="page2"></div>
    </div>

    <div id="roots">
        <div class="root-orb">☏</div>
        <div class="root-orb">✉</div>
        <div class="root-orb">◎</div>
        <div class="root-orb">◈</div>
    </div>

    <script>
        const container = document.getElementById('page-container');
        const p1 = document.getElementById('page1');
        const p2 = document.getElementById('page2');

        // Generate 4x6 Grids
        for(let i=0; i<24; i++) {
            p1.innerHTML += `<div class="mote"><div class="mote-core"></div></div>`;
            p2.innerHTML += `<div class="mote" style="opacity:0.5"><div class="mote-core"></div></div>`;
        }

        let startX, currentX;
        let page = 0;

        document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
        document.addEventListener('touchmove', e => {
            currentX = e.touches[0].clientX;
            // Optional: Live drag effect can be added here
        });
        document.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            if (endX < startX - 80 && page === 0) {
                container.style.transform = 'translateX(-100vw)';
                page = 1;
            } else if (endX > startX + 80 && page === 1) {
                container.style.transform = 'translateX(0)';
                page = 0;
            }
        });
    </script>
</body>
</html>
