<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bloom OS - Phase 3</title>
    <style>
        :root {
            --aura-self: #f5f5f7;
            --aura-family: #e8f5e9;
            --aura-social: #fff0eb;
            --aura-productivity: #e3f2fd;
            --aura-world: #eceff1;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; transition: background-color 0.8s ease;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, sans-serif; touch-action: none;
            background-color: var(--aura-self);
        }

        /* The Nucleus */
        #nucleus {
            width: 130px; height: 130px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05), inset 0 -2px 10px rgba(255,255,255,1);
            backdrop-filter: blur(15px);
            z-index: 10; position: relative;
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* The Mote */
        #mote {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            position: absolute;
            top: 160px; /* Positioned below Nucleus */
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 5;
            opacity: 0; transform: translateY(20px);
        }
        #mote.visible { opacity: 1; transform: translateY(0); }
        #mote:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.9); }

        .mote-icon { font-size: 20px; opacity: 0.4; }

        #label-container {
            position: absolute; top: 80px; text-align: center;
            width: 100%; pointer-events: none;
        }
        .label {
            font-weight: 400; letter-spacing: 4px;
            color: rgba(0,0,0,0.2); text-transform: uppercase; font-size: 11px;
            opacity: 0; transition: opacity 0.5s ease; position: absolute; width: 100%;
        }
        .active-label { opacity: 1; }
        
        #void {
            position: absolute; bottom: 50px;
            width: 60px; height: 4px;
            background: rgba(0,0,0,0.05); border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="label-container">
        <div id="label-self" class="label active-label">Self</div>
        <div id="label-family" class="label">Family</div>
        <div id="label-social" class="label">Social</div>
        <div id="label-productivity" class="label">Productivity</div>
        <div id="label-world" class="label">World</div>
    </div>
    
    <div id="nucleus"></div>
    <div id="mote" class="visible">
        <span id="mote-icon" class="mote-icon">✦</span>
    </div>
    <div id="void"></div>

    <script>
        const nucleus = document.getElementById('nucleus');
        const mote = document.getElementById('mote');
        const moteIcon = document.getElementById('mote-icon');
        const body = document.body;
        
        const auras = ['self', 'family', 'social', 'productivity', 'world'];
        const colors = ['var(--aura-self)', 'var(--aura-family)', 'var(--aura-social)', 'var(--aura-productivity)', 'var(--aura-world)'];
        const icons = ['✦', '❤', '◎', '◈', 'map'];
        
        let currentIdx = 0;
        let startX;

        // Visual Reactivity for Nucleus
        nucleus.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            nucleus.style.transform = 'scale(1.1)';
        });

        document.addEventListener('touchend', (e) => {
            nucleus.style.transform = 'scale(1)';
            const endX = e.changedTouches[0].clientX;

            if (endX > startX + 60) shiftAura(1);
            else if (endX < startX - 60) shiftAura(-1);
        });

        function shiftAura(direction) {
            // Animation for Mote disappearance
            mote.classList.remove('visible');
            
            setTimeout(() => {
                document.getElementById(`label-${auras[currentIdx]}`).classList.remove('active-label');
                currentIdx = (currentIdx + direction + auras.length) % auras.length;
                
                body.style.backgroundColor = colors[currentIdx];
                document.getElementById(`label-${auras[currentIdx]}`).classList.add('active-label');
                
                // Change Mote Icon based on Aura
                moteIcon.innerText = icons[currentIdx];
                
                // Show Mote again
                mote.classList.add('visible');
            }, 300);
        }

        // Mote Interaction
        mote.addEventListener('click', () => {
            // For now, just a haptic-style reaction
            mote.style.transform = 'scale(1.5)';
            setTimeout(() => { mote.style.transform = 'scale(1)'; }, 200);
        });
    </script>
</body>
</html>
