<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bloom OS</title>
    <style>
        :root {
            --aura-self: #f5f5f7; /* The Pearl/Self Aura */
            --nucleus-color: rgba(255, 255, 255, 0.9);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--aura-self);
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, sans-serif;
            touch-action: none; /* Prevents iPhone "bounce" scrolling */
        }
        /* The Nucleus */
        #nucleus {
            width: 140px; height: 140px;
            background: var(--nucleus-color);
            border-radius: 50%;
            box-shadow: 0 15px 45px rgba(0,0,0,0.08), inset 0 -5px 15px rgba(255,255,255,1);
            backdrop-filter: blur(15px);
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; justify-content: center; align-items: center;
            z-index: 10; position: relative;
        }
        /* The Void (Anchor) */
        #void {
            position: absolute; bottom: 50px;
            width: 80px; height: 6px;
            background: rgba(0,0,0,0.06);
            border-radius: 10px;
        }
        .label {
            position: absolute; top: 80px;
            font-weight: 400; letter-spacing: 3px;
            color: rgba(0,0,0,0.25);
            text-transform: uppercase; font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="label">Self Aura</div>
    <div id="nucleus"></div>
    <div id="void"></div>

    <script>
        const nucleus = document.getElementById('nucleus');
        let isMoving = false;

        // Interaction: Touch Reactivity
        nucleus.addEventListener('touchstart', (e) => {
            isMoving = true;
            nucleus.style.transform = 'scale(1.15)';
            e.preventDefault();
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            if (!isMoving) return;
            const touch = e.touches[0];
            // Follow the thumb
            nucleus.style.position = 'absolute';
            nucleus.style.left = (touch.clientX - 70) + 'px';
            nucleus.style.top = (touch.clientY - 70) + 'px';
        }, {passive: false});

        document.addEventListener('touchend', () => {
            isMoving = false;
            nucleus.style.transform = 'scale(1)';
            // Spring back to center (Simple logic for now)
            nucleus.style.transition = 'all 0.6s cubic-bezier(0.19, 1, 0.22, 1)';
            nucleus.style.left = 'calc(50% - 70px)';
            nucleus.style.top = 'calc(50% - 70px)';
            setTimeout(() => { nucleus.style.transition = 'transform 0.3s cubic-bezier(0.19, 1, 0.22, 1)'; }, 600);
        });
    </script>
</body>
</html>
